<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Manager | Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-circle">
                    <i class="fas fa-database"></i>
                </div>
                <span>DB Manager</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#/dashboard" class="nav-item">
                    <i class="fas fa-house-user"></i>
                    <span>Xonadonlar</span>
                </a>
                <a href="#/peoples" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Aholi</span>
                </a>
                <a href="#/stat" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                    <span>Statistika</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>© 2024 Admin Panel</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="global-search" placeholder="Qidiruv (Manzil, Ism, Tel)...">
                </div>
                <div class="user-profile">
                    <button id="refresh-btn" class="icon-btn">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <div class="avatar">Admin</div>
                </div>
            </header>

            <section class="content-area">
                <div class="view-header">
                    <h2 id="view-title">Xonadonlar ro'yxati</h2>
                    <div class="view-actions">
                        <span id="data-count" class="badge">0 ta yozuv</span>
                    </div>
                </div>

                <div class="table-container glass">
                    <table id="data-table">
                        <thead id="table-head">
                            <!-- Dynamically injected -->
                        </thead>
                        <tbody id="table-body">
                            <!-- Dynamically injected -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination -->
                <div id="pagination-container" class="pagination">
                    <!-- Dynamically injected -->
                </div>
            </section>
        </main>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal">
        <div class="modal-content glass details-modal-content">
            <div class="modal-header">
                <h3>Xonadon ma'lumotlari</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div id="details-content">
                <!-- Injected via JS -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary close-modal">Yopish</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h3>Ma'lumotni tahrirlash</h3>
                <span class="close-modal">&times;</span>
            </div>
            <form id="edit-form">
                <!-- Form fields injected via JS -->
                <div id="form-fields"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal">Bekor qilish</button>
                    <button type="submit" class="btn btn-primary">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/repository.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
